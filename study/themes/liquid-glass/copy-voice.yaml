tone: elegant, calm, confident
vocabulary: refined but not pretentious
density: low to medium — let whitespace and glass do the talking
personality: luxury concierge, Apple keynote presenter

do:
  - short, impactful headlines (3-6 words)
  - minimal body text (glass panels shouldn't be walls of text)
  - evocative but specific ("See your data in context", not "Unleash the power")

avoid:
  - dense paragraphs (glass panels can't hold walls of text)
  - technical jargon on landing pages
  - aggressive CTAs ("BUY NOW", "DON'T MISS OUT")
  - all-caps (feels heavy on glass)
