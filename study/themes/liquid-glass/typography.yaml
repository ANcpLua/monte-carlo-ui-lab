systems:
  - name: sf-inspired
    heading: system-ui, -apple-system, sans-serif
    body: system-ui, -apple-system, sans-serif
    mono: ui-monospace, monospace
    scale: [13, 15, 17, 22, 28, 36]
    weight: [400, 500, 600]

  - name: plus-jakarta
    heading: "'Plus Jakarta Sans', sans-serif"
    body: "'Plus Jakarta Sans', sans-serif"
    mono: "'JetBrains Mono', monospace"
    scale: [13, 15, 17, 22, 28, 36]
    weight: [400, 500, 700]

rules:
  - medium weight minimum on glass surfaces (500 for body, 600 for headings)
  - generous letter-spacing on headings (-0.02em to -0.04em)
  - line-height 1.5 minimum for body on glass (readability through blur)
  - text-shadow optional for thin text on complex backgrounds
