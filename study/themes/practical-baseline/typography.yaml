systems:
  - name: system-default
    heading: system-ui, -apple-system, sans-serif
    body: system-ui, -apple-system, sans-serif
    mono: ui-monospace, "JetBrains Mono", monospace
    scale: [12, 14, 16, 20, 24, 30]
    weight: [400, 500, 600]

  - name: inter-clean
    heading: "'Inter', sans-serif"
    body: "'Inter', sans-serif"
    mono: "'JetBrains Mono', monospace"
    scale: [12, 14, 16, 20, 24, 30]
    weight: [400, 500, 600, 700]

rules:
  - strong hierarchy through size + weight, not decoration
  - compact line-height for dense views (1.3-1.5)
  - mono for data, code, timestamps, IDs
  - restrained heading sizes — no oversized display type in work surfaces
