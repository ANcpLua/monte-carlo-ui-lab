palettes:
  - name: classic-black
    bg: "#ffffff"
    fg: "#000000"
    muted: "#6b7280"
    accent: "#dc2626"
    rule-color: "#e5e7eb"
    dark:
      bg: "#0a0a0a"
      fg: "#fafafa"
      muted: "#a3a3a3"
      accent: "#ef4444"
      rule-color: "#262626"

  - name: warm-ink
    bg: "#fffbf5"
    fg: "#1a1a1a"
    muted: "#737373"
    accent: "#b91c1c"
    rule-color: "#e5e0d5"
    dark:
      bg: "#141210"
      fg: "#f5f0e8"
      muted: "#a3a3a3"
      accent: "#dc2626"
      rule-color: "#2a2825"

  - name: cool-monochrome
    bg: "#fafafa"
    fg: "#171717"
    muted: "#737373"
    accent: "#2563eb"
    rule-color: "#d4d4d4"
    dark:
      bg: "#0a0a0a"
      fg: "#ededed"
      muted: "#a3a3a3"
      accent: "#3b82f6"
      rule-color: "#2a2a2a"

rules:
  - no gradients, no opacity tricks, no color blending
  - one accent color only, used sparingly
  - rules (lines) are always gray, never colored
  - backgrounds are white or near-white, never tinted
